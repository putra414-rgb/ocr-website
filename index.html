<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Rizex OCR Online</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>

  <style>
    body {
      font-family: Arial;
      background: #0d0d0d;
      color: white;
      text-align: center;
      padding: 20px;
    }

    h1 {
      color: #00ffcc;
    }

    .box {
      background: #1a1a1a;
      padding: 15px;
      border-radius: 15px;
      margin-top: 15px;
    }

    img {
      max-width: 100%;
      border-radius: 10px;
      margin-top: 10px;
    }

    textarea {
      width: 100%;
      height: 150px;
      margin-top: 10px;
      border-radius: 10px;
      padding: 10px;
    }

    button {
      background: #00ffcc;
      border: none;
      padding: 10px;
      border-radius: 10px;
      cursor: pointer;
      margin: 5px;
      font-weight: bold;
    }

    button:hover {
      background: #00ccaa;
    }
  </style>
</head>
<body>

<h1>🚀 Rizex OCR Online</h1>

<div class="box">
  <input type="file" id="imageInput" accept="image/*">
  <br>
  <img id="preview">
</div>

<div class="box">
  <button onclick="convert()">Ubah ke Teks</button>
  <button onclick="downloadText()">Download Teks</button>
  <p id="status"></p>
</div>

<div class="box">
  <textarea id="result" placeholder="Hasil teks muncul di sini..."></textarea>
</div>

<script>
const input = document.getElementById("imageInput");
const preview = document.getElementById("preview");

input.addEventListener("change", () => {
  const file = input.files[0];
  if (file) {
    preview.src = URL.createObjectURL(file);
  }
});

function convert() {
  const file = input.files[0];
  if (!file) {
    alert("Upload gambar dulu!");
    return;
  }

  document.getElementById("status").innerText = "⏳ Processing...";

  Tesseract.recognize(file, "eng", {
    logger: m => {
      document.getElementById("status").innerText = m.status;
    }
  }).then(({ data: { text } }) => {
    document.getElementById("result").value = text;
    document.getElementById("status").innerText = "✅ Selesai!";
  });
}

function downloadText() {
  const text = document.getElementById("result").value;
  const blob = new Blob([text], { type: "text/plain" });
  const a = document.createElement("a");

  a.href = URL.createObjectURL(blob);
  a.download = "hasil-ocr.txt";
  a.click();
}
</script>

</body>
</html>
